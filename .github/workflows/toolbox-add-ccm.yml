name: Add CCM to toolbox

on:
  push:
    branches:
      - agent/toolbox-add-ccm
    paths:
      - '.github/workflows/toolbox-add-ccm.yml'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/toolbox-add-ccm

      - name: Add CCM card without changing existing cards
        shell: python
        run: |
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          if 'data-tool="老板扣卡管理系统"' in text:
              print('CCM card already exists; validating current result')
          else:
              css_anchor = '''    .actions {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
              }
              '''
              css_insert = css_anchor + '''    .actions.actions-two {
                grid-template-columns: repeat(2, minmax(0, 1fr));
              }
              '''
              if css_anchor not in text:
                  raise SystemExit('actions CSS anchor not found')
              text = text.replace(css_anchor, css_insert, 1)

              card_anchor = '      <article class="card tip-card" aria-label="苹果用户使用提示">'
              card = '''      <article class="card tool-card" data-tool="老板扣卡管理系统">
                <div class="tool-head">
                  <h2 class="tool-title">老板扣卡管理系统</h2>
                  <p class="desc">老板余额、充值、扣款与消费记录管理，支持订单提取和数据备份。</p>
                </div>

                <div class="actions actions-two">
                  <a class="btn primary" href="https://srhovo.github.io/ccm/">打开网页版</a>
                  <button class="btn outline" type="button" data-copy="老板扣卡管理系统\n网页版：https://srhovo.github.io/ccm/">复制链接</button>
                </div>

                <div class="link-box" aria-label="老板扣卡管理系统链接信息">
                  <div class="link-row">
                    <span class="link-label">网页版</span>
                    <span class="url">https://srhovo.github.io/ccm/</span>
                    <button class="mini-copy" type="button" aria-label="复制老板扣卡管理系统网页版链接" data-copy="https://srhovo.github.io/ccm/">⧉</button>
                  </div>
                </div>
              </article>

              '''
              if card_anchor not in text:
                  raise SystemExit('tip card anchor not found')
              text = text.replace(card_anchor, card + card_anchor, 1)
              path.write_text(text, encoding='utf-8')

      - name: Static structure and regression checks
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from html.parser import HTMLParser
          import re

          text = Path('index.html').read_text(encoding='utf-8')
          required = [
              'data-tool="码单器"',
              'data-tool="订单整理计算器"',
              'data-tool="老板扣卡管理系统"',
              'https://srhovo.github.io/madan/',
              'https://srhovo.github.io/orca/',
              'https://srhovo.github.io/ccm/',
              'class="actions actions-two"',
              'aria-label="老板扣卡管理系统链接信息"'
          ]
          missing = [item for item in required if item not in text]
          if missing:
              raise SystemExit('missing required content: ' + ', '.join(missing))

          if text.count('data-tool="老板扣卡管理系统"') != 1:
              raise SystemExit('CCM card must appear exactly once')
          if text.count('https://srhovo.github.io/ccm/') != 4:
              raise SystemExit('CCM URL must appear exactly four times')
          if text.count('data-tool="码单器"') != 1 or text.count('data-tool="订单整理计算器"') != 1:
              raise SystemExit('existing tool cards changed unexpectedly')

          class Parser(HTMLParser):
              pass
          parser = Parser()
          parser.feed(text)

          ids = re.findall(r'\bid="([^"]+)"', text)
          duplicates = sorted({item for item in ids if ids.count(item) > 1})
          if duplicates:
              raise SystemExit('duplicate ids: ' + ', '.join(duplicates))

          scripts = re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>', text, re.S | re.I)
          if len(scripts) != 1:
              raise SystemExit(f'expected one inline script, got {len(scripts)}')
          Path('/tmp/toolbox.js').write_text(scripts[0], encoding='utf-8')
          print('static checks passed')
          PY
          node --check /tmp/toolbox.js

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Browser smoke test
        shell: bash
        run: |
          timeout 40s chrome --headless --no-sandbox --disable-gpu --disable-dev-shm-usage --allow-file-access-from-files --virtual-time-budget=3000 --dump-dom "file://${GITHUB_WORKSPACE}/index.html" > /tmp/toolbox-dom.html
          python - <<'PY'
          from pathlib import Path
          dom = Path('/tmp/toolbox-dom.html').read_text(encoding='utf-8')
          checks = {
              'title': '<h1 id="page-title">下雪工具箱</h1>' in dom,
              'madan': 'data-tool="码单器"' in dom,
              'orca': 'data-tool="订单整理计算器"' in dom,
              'ccm': 'data-tool="老板扣卡管理系统"' in dom,
              'ccm_link': 'href="https://srhovo.github.io/ccm/"' in dom,
              'guide': 'id="guideModal"' in dom,
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit(f'browser smoke failed: {failed}')
          print('browser smoke passed:', checks)
          PY

      - name: Commit validated toolbox update
        shell: bash
        run: |
          rm -f .github/workflows/toolbox-add-ccm.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/toolbox-add-ccm.yml
          if git diff --cached --quiet; then
            echo "No validated changes to commit"
          else
            git commit -m "在下雪工具箱加入老板扣卡管理系统"
            git push origin HEAD:agent/toolbox-add-ccm
          fi
