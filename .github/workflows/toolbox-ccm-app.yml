name: Add CCM Android link

on:
  push:
    branches:
      - agent/toolbox-add-ccm-app
    paths:
      - '.github/workflows/toolbox-ccm-app.yml'
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout update branch
        uses: actions/checkout@v4
        with:
          ref: agent/toolbox-add-ccm-app

      - name: Add CCM Android app entry
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          article_pattern = re.compile(
              r'(<article class="card tool-card" data-tool="老板扣卡管理系统">)(.*?)(</article>)',
              re.S
          )
          match = article_pattern.search(text)
          if not match:
              raise SystemExit('CCM tool card not found')

          article = match.group(2)
          app_url = 'https://www.pgyer.com/xueccm'

          if app_url not in article:
              actions_pattern = re.compile(r'<div class="actions actions-two">.*?</div>', re.S)
              actions = '''<div class="actions">
                  <a class="btn" href="https://srhovo.github.io/ccm/">打开网页版</a>
                  <a class="btn primary" href="https://www.pgyer.com/xueccm">下载安卓 APP</a>
                  <button class="btn outline" type="button" data-copy="老板扣卡管理系统\n网页版：https://srhovo.github.io/ccm/\n安卓APP：https://www.pgyer.com/xueccm">复制链接</button>
                </div>'''
              article, count = actions_pattern.subn(actions, article, count=1)
              if count != 1:
                  raise SystemExit('CCM actions block replacement failed')

              link_pattern = re.compile(r'<div class="link-box" aria-label="老板扣卡管理系统链接信息">.*?</div>\s*</div>', re.S)
              link_box = '''<div class="link-box" aria-label="老板扣卡管理系统链接信息">
                  <div class="link-row">
                    <span class="link-label">网页版</span>
                    <span class="url">https://srhovo.github.io/ccm/</span>
                    <button class="mini-copy" type="button" aria-label="复制老板扣卡管理系统网页版链接" data-copy="https://srhovo.github.io/ccm/">⧉</button>
                  </div>
                  <div class="link-row">
                    <span class="link-label">APP</span>
                    <span class="url">https://www.pgyer.com/xueccm</span>
                    <button class="mini-copy" type="button" aria-label="复制老板扣卡管理系统安卓 APP 链接" data-copy="https://www.pgyer.com/xueccm">⧉</button>
                  </div>
                </div>'''
              article, count = link_pattern.subn(link_box, article, count=1)
              if count != 1:
                  raise SystemExit('CCM link box replacement failed')

              text = text[:match.start(2)] + article + text[match.end(2):]

          text = re.sub(
              r'\n\s*\.actions\.actions-two\s*\{\s*grid-template-columns:\s*repeat\(2,\s*minmax\(0,\s*1fr\)\);\s*\}\s*',
              '\n',
              text,
              count=1
          )

          path.write_text(text, encoding='utf-8')

      - name: Static structure and regression checks
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from html.parser import HTMLParser
          import re

          text = Path('index.html').read_text(encoding='utf-8')
          web_url = 'https://srhovo.github.io/ccm/'
          app_url = 'https://www.pgyer.com/xueccm'

          required = [
              'data-tool="码单器"',
              'data-tool="订单整理计算器"',
              'data-tool="老板扣卡管理系统"',
              '<a class="btn" href="https://srhovo.github.io/ccm/">打开网页版</a>',
              '<a class="btn primary" href="https://www.pgyer.com/xueccm">下载安卓 APP</a>',
              '安卓APP：https://www.pgyer.com/xueccm',
              'aria-label="复制老板扣卡管理系统安卓 APP 链接"'
          ]
          missing = [item for item in required if item not in text]
          if missing:
              raise SystemExit('missing required content: ' + ', '.join(missing))

          if text.count('data-tool="老板扣卡管理系统"') != 1:
              raise SystemExit('CCM card must appear exactly once')
          if text.count(web_url) != 4:
              raise SystemExit(f'CCM web URL count mismatch: {text.count(web_url)}')
          if text.count(app_url) != 4:
              raise SystemExit(f'CCM app URL count mismatch: {text.count(app_url)}')
          if 'actions-two' in text:
              raise SystemExit('unused actions-two modifier remains')
          if text.count('data-tool="码单器"') != 1 or text.count('data-tool="订单整理计算器"') != 1:
              raise SystemExit('existing tool cards changed unexpectedly')

          class Parser(HTMLParser):
              pass
          Parser().feed(text)

          ids = re.findall(r'\bid="([^"]+)"', text)
          duplicates = sorted({item for item in ids if ids.count(item) > 1})
          if duplicates:
              raise SystemExit('duplicate ids: ' + ', '.join(duplicates))

          scripts = re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>', text, re.S | re.I)
          if len(scripts) != 1:
              raise SystemExit(f'expected one inline script, got {len(scripts)}')
          Path('/tmp/toolbox.js').write_text(scripts[0], encoding='utf-8')
          print('toolbox static checks passed')
          PY
          node --check /tmp/toolbox.js

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Real Chrome smoke test
        shell: bash
        run: |
          timeout 40s chrome --headless --no-sandbox --disable-gpu --disable-dev-shm-usage --allow-file-access-from-files --virtual-time-budget=3000 --dump-dom "file://${GITHUB_WORKSPACE}/index.html" > /tmp/toolbox-dom.html
          python - <<'PY'
          from pathlib import Path
          dom = Path('/tmp/toolbox-dom.html').read_text(encoding='utf-8')
          checks = {
              'title': '<h1 id="page-title">下雪工具箱</h1>' in dom,
              'madan': 'data-tool="码单器"' in dom,
              'orca': 'data-tool="订单整理计算器"' in dom,
              'ccm': 'data-tool="老板扣卡管理系统"' in dom,
              'ccm_web': 'href="https://srhovo.github.io/ccm/"' in dom,
              'ccm_app': 'href="https://www.pgyer.com/xueccm"' in dom,
              'guide': 'id="guideModal"' in dom,
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit(f'Chrome smoke failed: {failed}')
          print('toolbox Chrome smoke passed:', checks)
          PY

      - name: Commit validated toolbox page
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No page changes to commit"
          else
            git commit -m "补充 CCM 安卓 APP 下载入口"
            git push origin HEAD:agent/toolbox-add-ccm-app
          fi
